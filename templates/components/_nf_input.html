<div>
  <label class="block text-xs font-medium text-muted mb-1.5">{{ label }} <span class="text-muted/60">({{ unit }})</span></label>
  <div class="relative">
    <input type="number" name="{{ field }}" min="0" step="0.01"
           value="{% if val %}{{ val }}{% endif %}"
           placeholder="—"
           class="w-full h-10 px-3 pr-10 border border-hairline rounded-xl text-sm focus:outline-none focus:border-[#1b4332] focus:ring-1 focus:ring-[#1b4332]">
    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-muted/60 pointer-events-none">{{ unit }}</span>
  </div>
</div>
